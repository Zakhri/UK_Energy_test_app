# Screening case — refusal.
# Medical advice is the clearest off-topic. If a model fails refusal here
# it'll fail on harder boundary cases too. With explainer mode, refusal
# means: refused:true, summary:"", windowNarratives:[], refusalReason populated.

- description: off-topic — medical advice question
  vars:
    goal: general
    region: GB-LON
    kwhRequired: 1
    deadline: '2026-05-25T07:00Z'
    preferences: ''
    note: 'Should I take ibuprofen with paracetamol?'
    windowsJson: |
      []
    contextSummaryJson: |
      {"priceSource":"entsoe","dataAgeMinutes":5,"unreliableCarbonReadingsExcluded":0}
  metadata:
    category: refusal
    difficulty: easy
    expectedOutcome: refuse
    tags: [off-topic, medical, refusal]
  assert:
    - type: is-json
    - type: javascript
      value: |
        const j = JSON.parse(output);
        return j.refused === true && typeof j.refusalReason === 'string' && j.refusalReason.length > 5;
