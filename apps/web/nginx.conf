# nginx config for the dashboard container.
# - Serves the React SPA from /usr/share/nginx/html with index.html fallback.
# - Proxies /api/* to the api container (service name `api`, port 3000).
# - Adds reasonable compression + caching headers for static assets.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/javascript application/javascript application/json image/svg+xml;

    # ----- API proxy -----
    location /api/ {
        proxy_pass http://api:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Pass-through the request-id and CORS headers from the API.
        proxy_pass_header X-Request-Id;

        # Long enough for Gemini cold calls (Flash p95 ~2.5s).
        proxy_connect_timeout 5s;
        proxy_send_timeout 30s;
        proxy_read_timeout 30s;
    }

    # ----- Static assets — long cache for hashed bundles -----
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # ----- SPA fallback — every other path serves index.html so React Router works -----
    location / {
        # index.html itself must NEVER be cached, otherwise users keep
        # the old bundle hash and never see new deploys.
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        try_files $uri $uri/ /index.html;
    }

    # ----- Health probe (used by docker-compose if needed) -----
    location = /__nginx_health {
        access_log off;
        return 200 'ok';
        add_header Content-Type text/plain;
    }
}
