name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Manual trigger from GitHub UI ("Run workflow"). Bypasses the path filters
  # and the AI-changes gate — useful for verifying the whole pipeline (deploys
  # + Promptfoo smoke) without making a no-op commit.
  workflow_dispatch: {}

permissions:
  contents: read
  id-token: write # Reserved for future OIDC migration — see deploy-api comment.

jobs:
  # ---------------------------------------------------------------------------
  # 1. lint-test — always runs on push + PR. Format + lint + typecheck + the
  #    full 148-test suite (105 backend + 43 frontend). Zero external calls.
  # ---------------------------------------------------------------------------
  lint-test:
    name: Lint · Typecheck · Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Use Node 22
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install
        run: npm ci

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Tests + coverage
        run: npm run test:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage/

  # ---------------------------------------------------------------------------
  # 2. sam-validate — offline IaC sanity check.
  # ---------------------------------------------------------------------------
  sam-validate:
    name: SAM template validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true
      - run: sam validate --template infrastructure/template.yaml --lint

  # ---------------------------------------------------------------------------
  # 3. build-web — verifies Vite build doesn't break.
  # ---------------------------------------------------------------------------
  build-web:
    name: Vite build
    runs-on: ubuntu-latest
    needs: lint-test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build:web
      - name: Upload web build artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: apps/web/dist/

  # ---------------------------------------------------------------------------
  # 4a. check-gemini-key — GitHub Actions forbids `secrets.*` in job-level `if:`
  #     conditions. Workaround: probe the secret in a tiny job and export a
  #     boolean output. Forks without the secret get `has_key=false` and the
  #     downstream eval skips silently.
  # ---------------------------------------------------------------------------
  check-gemini-key:
    name: Check Gemini key presence
    runs-on: ubuntu-latest
    outputs:
      has_key: ${{ steps.probe.outputs.has_key }}
    steps:
      - id: probe
        env:
          KEY: ${{ secrets.GEMINI_TEST_KEY }}
        run: |
          if [ -n "$KEY" ]; then
            echo "has_key=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_key=false" >> "$GITHUB_OUTPUT"
          fi

  # ---------------------------------------------------------------------------
  # 4b. promptfoo-eval — AI quality smoke check (2 representative cases:
  #     happy path + refusal). Skipped silently when GEMINI_TEST_KEY is absent
  #     (forked clones), and only runs when AI-relevant files actually changed.
  #
  #     Budget: 2 inference + 2 judge = 4 Gemini calls. < 1% of daily RPD.
  # ---------------------------------------------------------------------------
  promptfoo-eval:
    name: Promptfoo AI smoke
    runs-on: ubuntu-latest
    needs: [lint-test, check-gemini-key]
    if: |
      needs.check-gemini-key.outputs.has_key == 'true' &&
      (
        github.event_name == 'workflow_dispatch' ||
        github.event_name == 'pull_request' ||
        contains(toJSON(github.event.head_commit.modified), 'prompts/') ||
        contains(toJSON(github.event.head_commit.modified), 'apps/api/src/infra/ai/') ||
        contains(toJSON(github.event.head_commit.modified), 'ai/evals/')
      )
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Cache promptfoo responses
        uses: actions/cache@v4
        with:
          path: ~/.promptfoo
          key: promptfoo-${{ hashFiles('ai/evals/**/*.yaml') }}-${{ hashFiles('apps/api/src/prompts/**/*.md') }}
          restore-keys: |
            promptfoo-

      - name: Run Promptfoo smoke (2 cases)
        env:
          GOOGLE_API_KEY: ${{ secrets.GEMINI_TEST_KEY }}
        run: |
          npx promptfoo eval \
            -c ai/evals/promptfooconfig.yaml \
            --filter-pattern '(EV charging window|medical advice)' \
            --output ai/evals/results/ci.json

      - name: Upload eval results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: promptfoo-results
          path: ai/evals/results/

  # ---------------------------------------------------------------------------
  # 5. detect-changes — feeds the deploy jobs path filters so we don't redeploy
  #    on every push regardless of what actually changed.
  # ---------------------------------------------------------------------------
  detect-changes:
    name: Detect changed paths
    runs-on: ubuntu-latest
    # Only meaningful on real pushes — workflow_dispatch bypasses path filters
    # entirely (deploy jobs use `event_name == 'workflow_dispatch'` to opt in).
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'apps/api/**'
              - 'infrastructure/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'
            web:
              - 'apps/web/**'
              - 'packages/shared/**'
              - 'package.json'
              - 'package-lock.json'

  # ---------------------------------------------------------------------------
  # 6. deploy-api — SAM build + deploy to AWS. Runs ONLY on main pushes where
  #    apps/api/, infrastructure/, or packages/shared/ changed.
  #
  #    AUTH: short-lived access keys via secrets (AWS_ACCESS_KEY_ID +
  #    AWS_SECRET_ACCESS_KEY). PRODUCTION UPGRADE: switch to OIDC role
  #    assumption (no long-lived credentials, see id-token: write above).
  # ---------------------------------------------------------------------------
  deploy-api:
    name: Deploy API (SAM)
    runs-on: ubuntu-latest
    needs: [lint-test, sam-validate, detect-changes]
    # workflow_dispatch always deploys (detect-changes is skipped in that case).
    # On push: only when API-side paths actually changed.
    if: |
      always() &&
      needs.lint-test.result == 'success' &&
      needs.sam-validate.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.api == 'true'
      )
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: SAM build
        run: PROJECT_ROOT="$PWD" sam build --template infrastructure/template.yaml

      - name: SAM deploy
        run: |
          PROJECT_ROOT="$PWD" sam deploy \
            --config-file infrastructure/samconfig.toml \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset

  # ---------------------------------------------------------------------------
  # 7. deploy-web — S3 sync + CloudFront invalidation. Runs ONLY on main
  #    pushes where apps/web/ or packages/shared/ changed.
  #
  #    deploy-api runs first (when both changed) so the SPA hits the freshest
  #    API contract. When only web changed, this still runs in parallel with
  #    a skipped deploy-api.
  # ---------------------------------------------------------------------------
  deploy-web:
    name: Deploy Web (S3 + CloudFront)
    runs-on: ubuntu-latest
    needs: [lint-test, build-web, detect-changes, deploy-api]
    # `always() && success-or-skipped` lets this run even when deploy-api
    # was skipped due to no api-side changes.
    if: |
      always() &&
      needs.lint-test.result == 'success' &&
      needs.build-web.result == 'success' &&
      (
        github.event_name == 'workflow_dispatch' ||
        needs.detect-changes.outputs.web == 'true'
      ) &&
      (needs.deploy-api.result == 'success' || needs.deploy-api.result == 'skipped')
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-2

      - name: Build SPA
        run: npm run build:web

      - name: Deploy to S3 + invalidate CloudFront
        run: npm run deploy:web
